name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lune
        run: |
          curl -fsSL -o lune.zip https://github.com/lune-org/lune/releases/download/v0.10.4/lune-0.10.4-linux-x86_64.zip
          unzip -o lune.zip
          chmod +x lune

      - name: Run tests
        run: ./lune run Tests/RunInLune.luau
